# FAISS index and query (stage 1: bi-encoder retrieval; stage 2: cross-encoder rerank)
data_dir: data
model_path: data/model.pt
model_name: all-MiniLM-L12-v2
index_path: data/product.index
meta_path: data/product_meta.parquet
top_k: 10
# Reranker (stage 2): set reranker_path to enable; rerank_top_k = candidates to rerank
reranker_path: data/reranker
rerank_top_k: 100  # retrieve this many from stage 1, then rerank to top_k
